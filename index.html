<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveBroadcast - Host Panel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0d;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e94560;}
    header h1{font-size:1.6rem;color:#e94560;letter-spacing:2px;}
    header span{background:#e94560;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
    .container{max-width:960px;margin:30px auto;padding:0 16px;}
    .input-section{background:#1a1a2e;border-radius:12px;padding:24px;margin-bottom:24px;border:1px solid #333;}
    .input-section h2{font-size:1.1rem;color:#e94560;margin-bottom:16px;}
    .tabs{display:flex;gap:10px;margin-bottom:16px;}
    .tab{background:#16213e;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.9rem;border:1px solid transparent;}
    .tab.active{background:#e94560;color:#fff;border-color:#e94560;}
    .form-group{margin-bottom:12px;}
    .form-group label{display:block;font-size:.85rem;color:#aaa;margin-bottom:6px;}
    .form-group input{width:100%;background:#0f3460;border:1px solid #333;color:#fff;padding:10px;border-radius:8px;outline:none;}
    .form-group input:focus{border-color:#e94560;}
    .btn{background:#e94560;border:none;color:#fff;padding:10px 22px;border-radius:8px;font-size:.95rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;width:max-content;}
    .btn:hover{background:#c73652;}
    .btn.secondary{background:#16213e;border:1px solid #e94560;}
    .playlist{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:24px;}
    .playlist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;margin-bottom:8px;background:#16213e;cursor:pointer;}
    .playlist-item.active{background:#e94560;color:#fff;}
    .playlist-item .title{font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px;}
    .video-wrap{background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:20px;position:relative;}
    video, iframe{width:100%;height:100%;display:block;border:none;}
    .controls{background:#1a1a2e;border-radius:12px;padding:20px;}
    .broadcast-toggle{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px;}
    .live-dot{width:10px;height:10px;background:#e94560;border-radius:50%;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .status-bar{background:#16213e;border-radius:8px;padding:10px 16px;text-align:center;color:#aaa;font-size:.85rem;margin-top:16px;}
    .viewer-link{background:#1a1a2e;border-radius:12px;padding:16px 20px;margin-top:20px;text-align:center;}
    .viewer-link a{color:#7fdbff;word-break:break-all;}
  </style>
</head>
<body>
  <header>
    <h1>&#127909; LiveBroadcast</h1>
    <span>HOST PANEL</span>
  </header>
  <div class="container">
    <div class="input-section">
      <h2>&#128249; Add Content</h2>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('file')">File</div>
        <div class="tab" onclick="switchTab('link')">URL / Drive / YT</div>
      </div>
      
      <div id="fileGroup">
        <div class="form-group">
          <label>Select local video file</label>
          <input type="file" id="videoInput" accept="video/*" multiple />
        </div>
      </div>
      
      <div id="linkGroup" style="display:none;">
        <div class="form-group">
          <label>Paste Link (Direct Video, YouTube, or Shared Google Drive Link)</label>
          <input type="text" id="linkInput" placeholder="https://youtube.com/watch?v=... or direct .mp4 link" />
        </div>
        <button class="btn" onclick="addLink()">Add to Playlist</button>
      </div>
    </div>

    <div class="playlist">
      <h2>&#127916; Playlist</h2>
      <div id="playlistContainer"><p style="color:#666;font-size:.9rem;">No videos yet.</p></div>
    </div>

    <div class="video-wrap" id="previewContainer">
      <video id="videoPlayer" controls style="display:none;"></video>
      <iframe id="iframePlayer" style="display:none;"></iframe>
      <div id="placeholder" style="display:flex;align-items:center;justify-content:center;height:100%;color:#444;">Select a video to preview</div>
    </div>

    <div class="controls">
      <div class="broadcast-toggle">
        <div class="live-dot" id="liveDot" style="display:none;"></div>
        <button class="btn" id="broadcastBtn" onclick="toggleBroadcast()">&#128247; Start Broadcasting</button>
      </div>
      <div class="status-bar" id="statusBar">Ready to broadcast.</div>
    </div>

    <div class="viewer-link">
      <h3>&#128279; Share with Friends</h3>
      <a id="viewerUrl" href="#" target="_blank"></a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDummy_ReplaceWithYourKey",
      databaseURL: "https://livebroadcast-app-default-rtdb.firebaseio.com",
      projectId: "livebroadcast-app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const video = document.getElementById('videoPlayer');
    const iframe = document.getElementById('iframePlayer');
    const placeholder = document.getElementById('placeholder');
    const statusBar = document.getElementById('statusBar');
    const liveDot = document.getElementById('liveDot');

    let playlist = [];
    let currentIndex = -1;
    let isBroadcasting = false;

    window.switchTab = (type) => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      document.getElementById('fileGroup').style.display = type==='file'?'block':'none';
      document.getElementById('linkGroup').style.display = type==='link'?'block':'none';
    };

    function processLink(url) {
      if(url.includes('youtube.com/watch?v=')) {
        const id = url.split('v=')[1].split('&')[0];
        return { type: 'youtube', src: `https://www.youtube.com/embed/${id}?autoplay=1`, title: 'YouTube: ' + id };
      }
      if(url.includes('youtu.be/')) {
        const id = url.split('youtu.be/')[1].split('?')[0];
        return { type: 'youtube', src: `https://www.youtube.com/embed/${id}?autoplay=1`, title: 'YouTube: ' + id };
      }
      if(url.includes('drive.google.com/file/d/')) {
        const id = url.split('/d/')[1].split('/')[0];
        return { type: 'iframe', src: `https://drive.google.com/file/d/${id}/preview`, title: 'Google Drive Video' };
      }
      return { type: 'video', src: url, title: url.split('/').pop() || 'Remote Video' };
    }

    window.addLink = () => {
      const input = document.getElementById('linkInput');
      if(!input.value) return;
      playlist.push(processLink(input.value));
      input.value = '';
      renderPlaylist();
      if(currentIndex === -1) loadVideo(0);
    };

    document.getElementById('videoInput').addEventListener('change', (e) => {
      Array.from(e.target.files).forEach(file => {
        playlist.push({ type: 'file', src: URL.createObjectURL(file), title: file.name });
      });
      renderPlaylist();
      if(currentIndex === -1) loadVideo(0);
    });

    window.loadVideo = (index) => {
      currentIndex = index;
      const item = playlist[index];
      placeholder.style.display = 'none';
      
      if(item.type === 'file' || item.type === 'video') {
        iframe.style.display = 'none';
        iframe.src = '';
        video.style.display = 'block';
        video.src = item.src;
        video.play().catch(()=>{});
      } else {
        video.style.display = 'none';
        video.pause();
        iframe.style.display = 'block';
        iframe.src = item.src;
      }
      renderPlaylist();
      pushState();
    };

    window.renderPlaylist = () => {
      const container = document.getElementById('playlistContainer');
      container.innerHTML = playlist.map((item, i) => `
        <div class="playlist-item ${i===currentIndex?'active':''}" onclick="loadVideo(${i})">
          <span class="title">${item.title}</span>
          <span style="font-size:.7rem;opacity:.6;">${item.type.toUpperCase()}</span>
        </div>
      `).join('') || '<p style="color:#666;font-size:.9rem;">No videos yet.</p>';
    };

    window.toggleBroadcast = () => {
      isBroadcasting = !isBroadcasting;
      const btn = document.getElementById('broadcastBtn');
      if(isBroadcasting) {
        btn.innerHTML = '&#9209; Stop Broadcasting';
        liveDot.style.display = 'block';
        pushState();
        statusBar.textContent = 'Broadcasting LIVE!';
      } else {
        btn.innerHTML = '&#128247; Start Broadcasting';
        liveDot.style.display = 'none';
        set(ref(db, 'broadcast'), { live: false });
        statusBar.textContent = 'Broadcast stopped.';
      }
    };

    function pushState() {
      if(!isBroadcasting || currentIndex === -1) return;
      const item = playlist[currentIndex];
      set(ref(db, 'broadcast'), {
        live: true,
        type: item.type,
        src: item.src,
        title: item.title,
        ts: Date.now()
      });
    }

    const vUrl = window.location.href.replace('index.html', 'viewer.html');
    document.getElementById('viewerUrl').textContent = vUrl;
    document.getElementById('viewerUrl').href = vUrl;
  </script>
</body>
</html>
