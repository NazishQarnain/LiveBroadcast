<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveBroadcast - Host Panel</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0d;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e94560;}
    header h1{font-size:1.6rem;color:#e94560;letter-spacing:2px;}
    header span{background:#e94560;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;}
    .container{max-width:960px;margin:30px auto;padding:0 16px;}
    .upload-box{background:#1a1a2e;border:2px dashed #e94560;border-radius:12px;padding:30px;text-align:center;cursor:pointer;transition:.3s;margin-bottom:24px;}
    .upload-box:hover{background:#16213e;}
    .upload-box input{display:none;}
    .upload-box label{cursor:pointer;font-size:1rem;color:#ccc;}
    .upload-box label span{color:#e94560;font-weight:bold;}
    .playlist{background:#1a1a2e;border-radius:12px;padding:20px;margin-bottom:24px;}
    .playlist h2{margin-bottom:12px;color:#e94560;font-size:1.1rem;}
    .playlist-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-radius:8px;margin-bottom:8px;background:#16213e;cursor:pointer;transition:.2s;}
    .playlist-item:hover{background:#0f3460;}
    .playlist-item.active{background:#e94560;color:#fff;}
    .playlist-item .title{font-size:.95rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px;}
    .playlist-item .del-btn{background:none;border:none;color:#aaa;cursor:pointer;font-size:1rem;padding:4px 8px;}
    .playlist-item.active .del-btn{color:#fff;}
    .video-wrap{background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:20px;position:relative;}
    video{width:100%;height:100%;display:block;object-fit:contain;}
    .controls{background:#1a1a2e;border-radius:12px;padding:20px;}
    .progress-wrap{margin-bottom:16px;}
    .progress-label{display:flex;justify-content:space-between;font-size:.8rem;color:#aaa;margin-bottom:6px;}
    input[type=range]{width:100%;accent-color:#e94560;cursor:pointer;}
    .btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:16px;}
    .btn{background:#e94560;border:none;color:#fff;padding:10px 22px;border-radius:8px;font-size:.95rem;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;}
    .btn:hover{background:#c73652;}
    .btn.secondary{background:#16213e;border:1px solid #e94560;}
    .btn.secondary:hover{background:#0f3460;}
    .volume-row{display:flex;align-items:center;gap:10px;justify-content:center;}
    .volume-row label{font-size:.85rem;color:#aaa;}
    .status-bar{background:#16213e;border-radius:8px;padding:10px 16px;text-align:center;color:#aaa;font-size:.85rem;margin-top:16px;}
    .viewer-link{background:#1a1a2e;border-radius:12px;padding:16px 20px;margin-top:20px;text-align:center;}
    .viewer-link h3{color:#e94560;margin-bottom:10px;}
    .viewer-link a{color:#7fdbff;word-break:break-all;}
    .copy-btn{background:#e94560;border:none;color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;margin-left:10px;font-size:.85rem;}
    .broadcast-toggle{display:flex;align-items:center;gap:12px;justify-content:center;margin-bottom:16px;}
    .live-dot{width:10px;height:10px;background:#e94560;border-radius:50%;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    @media(max-width:600px){.btn-row{gap:8px;}.btn{padding:8px 14px;font-size:.85rem;}}
  </style>
</head>
<body>
  <header>
    <h1>&#127909; LiveBroadcast</h1>
    <span id="hostBadge">HOST PANEL</span>
  </header>
  <div class="container">
    <div class="upload-box">
      <input type="file" id="videoInput" accept="video/*" multiple />
      <label for="videoInput">&#128190; <span>Click to upload videos</span> &mdash; MP4, WebM, MOV supported</label>
    </div>
    <div class="playlist">
      <h2>&#127916; Playlist</h2>
      <div id="playlistContainer"><p style="color:#666;font-size:.9rem;">No videos yet. Upload some above!</p></div>
    </div>
    <div class="video-wrap">
      <video id="videoPlayer" preload="auto"></video>
    </div>
    <div class="controls">
      <div class="broadcast-toggle">
        <div class="live-dot" id="liveDot" style="display:none;"></div>
        <button class="btn" id="broadcastBtn" onclick="toggleBroadcast()">&#128247; Start Broadcasting</button>
      </div>
      <div class="progress-wrap">
        <div class="progress-label"><span id="currentTime">0:00</span><span id="duration">0:00</span></div>
        <input type="range" id="seekBar" min="0" max="100" value="0" oninput="seekVideo(this.value)" />
      </div>
      <div class="btn-row">
        <button class="btn secondary" onclick="prevVideo()">&#9664;&#9664; Prev</button>
        <button class="btn" id="playPauseBtn" onclick="togglePlay()">&#9654; Play</button>
        <button class="btn secondary" onclick="nextVideo()">Next &#9654;&#9654;</button>
      </div>
      <div class="volume-row">
        <label>&#128266; Volume</label>
        <input type="range" id="volumeBar" min="0" max="1" step="0.05" value="1" style="width:160px;" oninput="setVolume(this.value)" />
      </div>
      <div class="status-bar" id="statusBar">No video loaded. Upload and select a video.</div>
    </div>
    <div class="viewer-link">
      <h3>&#128279; Share with Friends</h3>
      <p style="font-size:.85rem;color:#aaa;margin-bottom:8px;">Your friends should open this link to watch:</p>
      <a id="viewerUrl" href="#"></a>
      <button class="copy-btn" onclick="copyLink()">Copy</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDummy_ReplaceWithYourKey",
      authDomain: "livebroadcast-app.firebaseapp.com",
      databaseURL: "https://livebroadcast-app-default-rtdb.firebaseio.com",
      projectId: "livebroadcast-app",
      storageBucket: "livebroadcast-app.appspot.com",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:000000000000000000000000"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const video = document.getElementById('videoPlayer');
    const seekBar = document.getElementById('seekBar');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const statusBar = document.getElementById('statusBar');
    const liveDot = document.getElementById('liveDot');

    let playlist = [];
    let currentIndex = -1;
    let isBroadcasting = false;
    let videoURLs = {};

    window.toggleBroadcast = function() {
      isBroadcasting = !isBroadcasting;
      const btn = document.getElementById('broadcastBtn');
      if(isBroadcasting) {
        btn.innerHTML = '&#9209; Stop Broadcasting';
        btn.style.background = '#c73652';
        liveDot.style.display = 'block';
        pushState();
        statusBar.textContent = 'Broadcasting LIVE! Friends can now join.';
      } else {
        btn.innerHTML = '&#128247; Start Broadcasting';
        btn.style.background = '#e94560';
        liveDot.style.display = 'none';
        set(ref(db, 'broadcast'), { live: false });
        statusBar.textContent = 'Broadcast stopped.';
      }
    };

    function pushState() {
      if(!isBroadcasting) return;
      const title = playlist[currentIndex] || '';
      set(ref(db, 'broadcast'), {
        live: true,
        index: currentIndex,
        title: title,
        currentTime: video.currentTime,
        paused: video.paused,
        volume: video.volume,
        ts: Date.now()
      });
    }

    document.getElementById('videoInput').addEventListener('change', function(e) {
      const files = Array.from(e.target.files);
      files.forEach(file => {
        const url = URL.createObjectURL(file);
        videoURLs[file.name] = url;
        playlist.push(file.name);
      });
      renderPlaylist();
      if(currentIndex === -1 && playlist.length > 0) loadVideo(0);
    });

    window.renderPlaylist = function() {
      const container = document.getElementById('playlistContainer');
      if(playlist.length === 0) {
        container.innerHTML = '<p style="color:#666;font-size:.9rem;">No videos yet. Upload some above!</p>';
        return;
      }
      container.innerHTML = playlist.map((name, i) => `
        <div class="playlist-item ${i===currentIndex?'active':''}" id="pli-${i}">
          <span class="title" onclick="loadVideo(${i})">&#127916; ${name}</span>
          <button class="del-btn" onclick="removeVideo(${i})">&#128465;</button>
        </div>
      `).join('');
    };

    window.loadVideo = function(index) {
      if(index < 0 || index >= playlist.length) return;
      currentIndex = index;
      const name = playlist[index];
      video.src = videoURLs[name];
      video.load();
      video.play().then(()=>{ updatePlayBtn(); pushState(); }).catch(()=>{});
      renderPlaylist();
      statusBar.textContent = 'Playing: ' + name;
      pushState();
    };

    window.removeVideo = function(index) {
      URL.revokeObjectURL(videoURLs[playlist[index]]);
      delete videoURLs[playlist[index]];
      playlist.splice(index, 1);
      if(currentIndex >= playlist.length) currentIndex = playlist.length - 1;
      renderPlaylist();
      if(playlist.length > 0) loadVideo(currentIndex >= 0 ? currentIndex : 0);
      else { video.src=''; statusBar.textContent='No video loaded.'; }
    };

    window.togglePlay = function() {
      if(video.paused) { video.play(); } else { video.pause(); }
      updatePlayBtn();
      pushState();
    };

    window.prevVideo = function() {
      if(currentIndex > 0) loadVideo(currentIndex - 1);
    };

    window.nextVideo = function() {
      if(currentIndex < playlist.length - 1) loadVideo(currentIndex + 1);
    };

    window.seekVideo = function(val) {
      if(video.duration) { video.currentTime = (val/100)*video.duration; pushState(); }
    };

    window.setVolume = function(val) {
      video.volume = val;
      pushState();
    };

    function updatePlayBtn() {
      playPauseBtn.innerHTML = video.paused ? '&#9654; Play' : '&#9646;&#9646; Pause';
    }

    function formatTime(s) {
      s = Math.floor(s||0);
      return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
    }

    video.addEventListener('timeupdate', ()=>{
      if(video.duration) seekBar.value = (video.currentTime/video.duration)*100;
      document.getElementById('currentTime').textContent = formatTime(video.currentTime);
      document.getElementById('duration').textContent = formatTime(video.duration);
      if(isBroadcasting && Math.floor(video.currentTime)%5===0) pushState();
    });

    video.addEventListener('ended', ()=>{ nextVideo(); });
    video.addEventListener('play', updatePlayBtn);
    video.addEventListener('pause', updatePlayBtn);

    // Viewer link
    const baseUrl = window.location.href.replace('index.html','').replace(/\/?$/,'/');
    const vUrl = baseUrl + 'viewer.html';
    document.getElementById('viewerUrl').textContent = vUrl;
    document.getElementById('viewerUrl').href = vUrl;

    window.copyLink = function() {
      navigator.clipboard.writeText(vUrl).then(()=>{ statusBar.textContent='Link copied to clipboard!'; });
    };
  </script>
</body>
</html>
