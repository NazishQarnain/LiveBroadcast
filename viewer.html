<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiveBroadcast - Watch</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0d0d;color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;}
    header{background:linear-gradient(135deg,#1a1a2e,#16213e);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #e94560;}
    header h1{font-size:1.6rem;color:#e94560;letter-spacing:2px;}
    .live-badge{background:#e94560;padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:bold;display:flex;align-items:center;gap:6px;}
    .dot{width:8px;height:8px;background:#fff;border-radius:50%;animation:pulse 1s infinite;}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
    .container{max-width:960px;margin:30px auto;padding:0 16px;}
    .video-wrap{background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;margin-bottom:20px;}
    video, iframe{width:100%;height:100%;display:block;border:none;}
    .status-msg{background:#16213e;border-radius:8px;padding:14px 20px;text-align:center;color:#aaa;font-size:.9rem;margin-bottom:16px;border:1px solid #333;}
    .info-bar{background:#1a1a2e;border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
    .video-title{font-size:1rem;color:#fff;}
    .waiting{text-align:center;padding:60px 20px;}
    .spinner{border:3px solid #16213e;border-top:3px solid #e94560;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin:20px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
  <header>
    <h1>&#127909; LiveBroadcast</h1>
    <div class="live-badge" id="liveBadge" style="display:none;"><div class="dot"></div> LIVE</div>
  </header>
  <div class="container">
    <div id="waitingScreen" class="waiting">
      <div class="spinner"></div>
      <h2>Waiting for host...</h2>
    </div>
    <div id="liveScreen" style="display:none;">
      <div class="status-msg">&#128994; LIVE - Broadcasting now</div>
      <div class="info-bar">
        <span class="video-title" id="videoTitle">Loading...</span>
      </div>
      <div class="video-wrap">
        <video id="viewerVideo" style="display:none;" controls playsinline></video>
        <iframe id="viewerIframe" style="display:none;" allow="autoplay; encrypted-media; fullscreen"></iframe>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDummy_ReplaceWithYourKey",
      databaseURL: "https://livebroadcast-app-default-rtdb.firebaseio.com",
      projectId: "livebroadcast-app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const video = document.getElementById('viewerVideo');
    const iframe = document.getElementById('viewerIframe');
    let lastSrc = '';

    onValue(ref(db, 'broadcast'), snap => {
      const data = snap.val();
      if(!data || !data.live) {
        document.getElementById('waitingScreen').style.display = 'block';
        document.getElementById('liveScreen').style.display = 'none';
        document.getElementById('liveBadge').style.display = 'none';
        iframe.src = '';
        video.src = '';
        return;
      }

      document.getElementById('waitingScreen').style.display = 'none';
      document.getElementById('liveScreen').style.display = 'block';
      document.getElementById('liveBadge').style.display = 'flex';
      document.getElementById('videoTitle').textContent = data.title;

      if(data.src !== lastSrc) {
        lastSrc = data.src;
        if(data.type === 'youtube' || data.type === 'iframe') {
          video.style.display = 'none';
          video.src = '';
          iframe.style.display = 'block';
          iframe.src = data.src;
        } else {
          iframe.style.display = 'none';
          iframe.src = '';
          video.style.display = 'block';
          video.src = data.src;
          video.play().catch(()=>{});
        }
      }
    });
  </script>
</body>
</html>
